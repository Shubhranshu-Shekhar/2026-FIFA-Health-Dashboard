name: Daily Public Health Data Update

on:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Data Ingestion Pipeline
      run: python fetch_data.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add public_health_data.json
        if git diff-index --quiet HEAD --; then
          echo "No changes in public_health_data.json to commit."
        else
          git commit -m "Automated Daily Public Health Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push
        fi
